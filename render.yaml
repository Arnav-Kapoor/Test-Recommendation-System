services:
  - type: web
    name: shl-recommender-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    buildCommand: playwright install chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.8
